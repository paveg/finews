name = "finews"
main = "src/index.ts"
compatibility_date = "2026-05-23"
compatibility_flags = ["nodejs_compat"]

[[d1_databases]]
binding = "DB"
database_name = "finews"
database_id = "475f3d97-f340-4ebc-80da-ca9b00042b77"
migrations_dir = "src/db/migrations"

[vars]
# 本番デフォルト。ローカル `wrangler dev` 時は `.dev.vars` で上書き:
#   ENVIRONMENT="development"
ENVIRONMENT = "production"

[triggers]
crons = [
  "30 21 * * SUN-THU",
]

# Persistent Workers Logs (console.log/warn/error が Dashboard の Logs
# タブで検索可能になる)。Paid プランで月 20M logs 無料、finews 規模
# では充分。tail と違いセッション終了後も残るので障害解析に必須。
[observability]
enabled = true
head_sampling_rate = 1
